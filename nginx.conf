# ── Portfolio: imhassan.dev ──────────────────────────────────────────────────
server {
    listen 80;
    server_name imhassan.dev www.imhassan.dev;

    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(css|js|png|jpg|ico|woff2)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
    add_header Referrer-Policy "strict-origin-when-cross-origin";

    gzip on;
    gzip_types text/html text/css application/javascript;
}

# ── Data Store: store.imhassan.dev ───────────────────────────────────────────
server {
    listen 80;
    server_name store.imhassan.dev;

    root /usr/share/nginx/html;
    index store.html;

    location = / {
        try_files /store.html =404;
    }

    location / {
        try_files $uri $uri/ /store.html;
    }

    location ~* \.(css|js|png|jpg|ico|woff2)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
    add_header Referrer-Policy "strict-origin-when-cross-origin";

    gzip on;
    gzip_types text/html text/css application/javascript;
}
